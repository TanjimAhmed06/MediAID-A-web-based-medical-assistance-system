<!DOCTYPE html>
<html>
<head>
  <title>Health Tips</title>
  <style>
    *{
      margin:0;
      padding: 0; 
    }
    body{
      display: flex;
      min-height: 100vh;
      flex-direction: column;
      background-color:white;
      text-align: center;
    }
    header{
      background-color: #0D47A1;
      color: white;
      box-shadow:0 0 5px rgba(0, 0, 0, 1);
      padding:25px;
    }
    #container{
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    #card{
      display: flex;
      flex-direction: column;
      justify-content: center;
      background-color:#36454F;
      padding: 80px;
      border-radius: 15px;
      box-shadow: 0 8px 15px rgba(0,0,0,0.2);
      margin-right:500px;
      margin-left:500px;
      margin-top: 45px;
      color:#7CFC00;
      height: 90px;
    }
    #card_top_half{
      display: flex;
      justify-content: center;
      font-size: 30px;
      font-weight: bolder;
    }
    #card_bottom_half{
      margin-top: 25px;
    }   
    #btn{
      height: 60px;
      width: 180px;
      background-color:#7CFC00;
      border-radius: 10px;
      font-size: 20px;
      font-weight: bolder;
      border-style: solid;
    } 
    #head_h1{
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
<header>
  <h1 id=head_h1>Health Tips</h1>
  <p>Click the button to get new tips!</p>
</header> 
<div id="container">
  <div id="card">
    <div id="card_top_half">
        <p>Welcome<p>
    </div>
    <div id=card_bottom_half>
      <button id="btn" onclick="newTip()">Get Tips!</button>
    </div>
  </div>
</div>
<script>
  const tips = [
  "Drink at least 8 glasses of water daily.",
  "Eat more fruits and vegetables.",
  "Exercise for at least 30 minutes every day.",
  "Get 7 to 9 hours of quality sleep.",
  "Practice meditation or deep breathing.",
  "Walk instead of sitting for long periods.",
  "Avoid too much junk food.",
  "Drink at least 8 glasses of water daily.",
  "Eat 5 servings of fruits and vegetables every day.",
  "Exercise for 30 minutes at least 5 times a week.",
  "Sleep 7–9 hours every night.",
  "Take 10,000 steps daily for better health.",
  "Limit sugar intake to less than 25g per day.",
  "Eat at least 2 servings of protein with each meal.",
  "Spend 15 minutes in sunlight every day.",
  "Drink 1–2 cups of green tea daily.",
  "Include 3 servings of whole grains daily.",
  "Maintain blood pressure below 120/80 mmHg.",
  "Walk 10 minutes after each meal to aid digestion.",
  "Wash hands for 20 seconds with soap regularly.",
  "Take a 5-minute stretch break every hour during work.",
  "Include 3 servings of calcium-rich foods daily.",
  "Avoid sitting more than 2 hours without moving.",
  "Include at least 2 liters of fluids per day.",
  "Brush and floss teeth twice daily.",
  "Reduce sodium intake to less than 2,300 mg per day.",
  "Practice good hygiene habits.",
  "Avoid excessive caffeine intake.",
  "Take care of your eyes—rest them from screens.",
  "Stay positive and motivated.",
  "Drink fresh juices instead of packaged ones.",
  "Include fiber-rich foods in your diet.",
  "Maintain a healthy body weight.",
  "Avoid skipping meals.",
  "Practice deep breathing exercises.",
  "Keep yourself organized and stress-free.",
  "Drink clean and safe water.",
  "Do regular health check-ups.",
  "Sleep in a comfortable and dark environment.",
  "Avoid late-night screen usage.",
  "Stay consistent with healthy habits."
];

  function newTip() {
    const randomIndex=Math.floor(Math.random()*tips.length);
    document.getElementById("card_top_half").innerText=tips[randomIndex];
  }
</script>
</body>
</html>
