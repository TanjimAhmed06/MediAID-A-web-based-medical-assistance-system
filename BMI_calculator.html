<!DOCTYPE html>
<html>
<head>
	<title>BMI Calculator</title>
	<style>
		*{
			margin: 0px;
			padding: 0px;
		}
		body{
			font-family: Arial, sans-serif;
			min-height: 100vh;
			display: flex;
			flex-direction: column;
			justify-content: center;
			align-items: center;
			background-color:#89CFF0;
		}
		h2{
      		margin-bottom: 20px;
      		color: #333;
    	}
    		#container{
			background: white;
      		padding: 50px;
      		border-radius: 12px;
      		box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      		text-align: center;
      		width: 300px;
		}
		input{
			width: 90%;
      		padding: 10px;
      		margin: 10px 0;
      		border: 1px solid #ccc;
      		border-radius: 6px;
		}
		button{
			background: #4facfe;
      		color: white;
      		border: none;
      		padding: 10px 20px;
      		border-radius: 6px;
      		cursor: pointer;
      		margin-top: 10px;
		}
		button:hover {
      		background: #00c6ff;
    	}
    	.result {
      		margin-top: 10px;
      		font-weight: bold;
      		color: black;
    	}
	</style>
</head>
<body>
<div id="container">
	<h2>BMI Calculator</h2>
	<input type="number" id="height_input" name="height" placeholder="Height (cm)"><br>
	<input type="number" id="weight_input" name="weight" placeholder="Weight (kg)"><br>
	<button onclick="calculateBMI()">Calculate</button>
	<div class="result" id="result"></div>
</div>
<script>
	function calculateBMI() {
    let height = document.getElementById("height_input").value / 100;
    let weight = document.getElementById("weight_input").value;

    if (height === 0 || weight === 0) {
      document.getElementById("result").innerText = "Please enter valid values!";
      return;
    }

    let bmi = (weight / (height * height)).toFixed(2);
    let category = "";

    if (bmi < 18.5) {
      category = "Underweight";
    } else if (bmi < 24.9) {
      category = "Normal weight";
    } else if (bmi < 29.9) {
      category = "Overweight";
    } else {
      category = "Obese";
    }
    document.getElementById("result").innerText =
      `Your BMI: ${bmi} (${category})`;
  }
</script>
</body>
</html>
